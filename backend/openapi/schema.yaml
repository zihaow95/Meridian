components:
  schemas:
    DeferredItem:
      type: object
      properties:
        public_id:
          type: string
        subject_type:
          type: string
        subject_public_id:
          type: string
        stage_code:
          type: string
        defer_reason:
          type: string
        restart_trigger:
          type: string
        next_review_quarter:
          type: string
        status:
          type: string
      required:
      - defer_reason
      - next_review_quarter
      - public_id
      - restart_trigger
      - stage_code
      - status
      - subject_public_id
      - subject_type
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      required:
      - service
      - status
    LifecycleBoardItem:
      type: object
      properties:
        item_type:
          type: string
        public_id:
          type: string
        business_no:
          type: string
        title:
          type: string
        lifecycle_stage:
          type: string
        status:
          type: string
        owner_public_id:
          type: string
        owner_display_name:
          type: string
        candidate_public_id:
          type: string
          nullable: true
        updated_at:
          type: string
      required:
      - business_no
      - candidate_public_id
      - item_type
      - lifecycle_stage
      - owner_display_name
      - owner_public_id
      - public_id
      - status
      - title
      - updated_at
    LifecycleBoardPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LifecycleBoardItem'
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        has_more:
          type: boolean
      required:
      - has_more
      - items
      - page
      - page_size
      - total_count
    MajorGateDecisionRequest:
      type: object
      properties:
        management_conclusion:
          type: string
        final_decision:
          type: string
        decision_summary:
          type: string
        idempotency_key:
          type: string
        defer_reason:
          type: string
        restart_trigger:
          type: string
        next_review_quarter:
          type: string
      required:
      - final_decision
      - idempotency_key
      - management_conclusion
    MajorGateDecisionResponse:
      type: object
      properties:
        public_id:
          type: string
        stage_gate_public_id:
          type: string
        management_conclusion:
          type: string
        final_decision:
          type: string
        has_conclusion_difference:
          type: boolean
        decision_summary:
          type: string
      required:
      - decision_summary
      - final_decision
      - has_conclusion_difference
      - management_conclusion
      - public_id
      - stage_gate_public_id
    MeResponse:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        display_name:
          type: string
        status:
          type: string
      required:
      - display_name
      - public_id
      - status
    QuarterlyReviewRequest:
      type: object
      properties:
        action:
          type: string
        note:
          type: string
        new_restart_trigger:
          type: string
        new_next_review_quarter:
          type: string
      required:
      - action
    QuarterlyReviewResponse:
      type: object
      properties:
        public_id:
          type: string
        action:
          type: string
        defer_record_public_id:
          type: string
      required:
      - action
      - defer_record_public_id
      - public_id
    StageGateSummary:
      type: object
      properties:
        public_id:
          type: string
        stage_code:
          type: string
        cycle_number:
          type: integer
        status:
          type: string
        subject_type:
          type: string
        subject_public_id:
          type: string
      required:
      - cycle_number
      - public_id
      - stage_code
      - status
      - subject_public_id
      - subject_type
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
