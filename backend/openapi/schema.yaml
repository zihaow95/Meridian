components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      required:
      - service
      - status
    MeResponse:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        display_name:
          type: string
        status:
          type: string
      required:
      - display_name
      - public_id
      - status
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
