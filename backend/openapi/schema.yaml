  /api/v1/health:
    get:
      operationId: health_retrieve
      summary: Liveness/readiness probe
      tags:
      - health
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                Ok:
                  value:
                    status: ok
                    service: meridian-api
                  summary: ok
          description: ''
  /api/v1/me:
    get:
      operationId: me_retrieve
      summary: Current authenticated user
      tags:
      - me
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: ''
  /api/v1/opportunities:
    get:
      operationId: opportunities_list_mine
      tags:
      - opportunities
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: opportunities_create
      tags:
      - opportunities
      security:
