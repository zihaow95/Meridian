version: '1.0'
name: pr-pipeline
displayName: PRPipeline
# Project Meridian PR CI: identical gates to the branch pipeline; blocks merge.
# Assumes the Gitee Go runner provides Docker (see branch-pipeline.yml note).
stages:
  - stage:
      name: backend
      displayName: 后端质量门禁
      strategy: fast
      trigger: auto
      steps:
        - step: build@python
          name: backend_quality
          displayName: 后端检查（MySQL）
          pythonVersion: '3.13'
          commands:
            - 'echo "== tool versions ==" && python3 --version && (node --version || echo "node: n/a") && (docker version || echo "docker: n/a")'
            - 'curl -LsSf https://astral.sh/uv/install.sh | sh'
            - 'export PATH="$HOME/.local/bin:$PATH" && uv --version'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv sync --locked'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run ruff check .'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run ruff format --check .'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run mypy config apps'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run python manage.py check --settings=config.settings.test'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run python manage.py makemigrations --check --dry-run --settings=config.settings.test'
            - 'cp .env.example .env && docker compose -f deploy/compose/compose.dev.yml --env-file .env up -d'
            - |
              for i in $(seq 1 60); do
                if docker exec meridian-dev-mysql-1 mysqladmin ping -h127.0.0.1 -uroot -pdev-root-password --silent 2>/dev/null; then
                  echo "mysql ready"; break
                fi
                echo "waiting for mysql ($i)"; sleep 3
                if [ "$i" -eq 60 ]; then echo "mysql failed to become ready"; exit 1; fi
              done
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run pytest -q'
            - 'export PATH="$HOME/.local/bin:$PATH" && cd backend && uv run python manage.py spectacular --file openapi/schema.yaml --validate --settings=config.settings.test'
            - 'git diff --exit-code -- backend/openapi/schema.yaml'
            - 'docker compose -f deploy/compose/compose.dev.yml --env-file .env down -v || true'
  - stage:
      name: frontend
      displayName: 前端质量门禁
      strategy: fast
      trigger: auto
      steps:
        - step: build@nodejs
          name: frontend_quality
          displayName: 前端检查
          nodeVersion: '24.0.0'
          commands:
            - 'cd frontend && npm ci'
            - 'cd frontend && npm run lint'
            - 'cd frontend && npm run format:check'
            - 'cd frontend && npm run typecheck'
            - 'cd frontend && npm run test:unit -- --run'
            - 'cd frontend && npm run build'
            - 'cd frontend && npm run api:generate'
            - 'git diff --exit-code -- frontend/src/api/generated/schema.d.ts'
  - stage:
      name: images
      displayName: 镜像构建（不推送）
      strategy: fast
      trigger: auto
      steps:
        - step: build@python
          name: image_build
          displayName: 构建前后端镜像
          pythonVersion: '3.13'
          commands:
            - 'docker build -t meridian-backend:ci backend'
            - 'docker build -f frontend/Dockerfile -t meridian-frontend:ci .'
triggers:
  pr:
    branches:
      include:
        - master
