# Nginx configuration for the Project Meridian SPA runtime image.
# Serves the built static assets and falls back to index.html for client-side
# routing. API traffic is routed to the backend by the deployment reverse proxy,
# not by this container, so no upstream is defined here in phase 0.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
